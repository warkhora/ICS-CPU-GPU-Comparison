<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ICS Build Your PC</title>

<style>
  body {
    margin: 0;
    padding: 40px;
    background: radial-gradient(circle at top, #101010, #000);
    color: #e6e6e6;
    font-family: "Segoe UI", system-ui, sans-serif;
  }

  .ics-container {
    max-width: 900px;
    margin: auto;
  }

  h1 {
    text-align: center;
    color: gold;
    letter-spacing: 2px;
  }

  .frame {
    background: rgba(20,20,20,0.85);
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #333;
    margin-bottom: 25px;
  }

  select, input, button {
    background: #111;
    color: #eee;
    border: 1px solid #444;
    padding: 10px 14px;
    border-radius: 8px;
    margin: 5px 0;
    width: 100%;
    font-size: 14px;
  }

  button:hover {
    border-color: gold;
    cursor: pointer;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
  }

  th, td {
    padding: 10px;
    border-bottom: 1px solid #333;
  }

  th {
    color: gold;
    text-align: left;
  }
</style>
</head>

<body>
<div class="ics-container">

  <h1>Build Your PC</h1>

  <div class="frame">
    <label>Budget (USD)</label>
    <input type="number" id="budget" placeholder="Enter your budget...">

    <label>Resolution Target</label>
    <select id="resolution">
      <option value="1080">1080p</option>
      <option value="1440">1440p</option>
      <option value="2160">4K</option>
    </select>

    <label>Priority</label>
    <select id="priority">
      <option value="fps">Highest FPS</option>
      <option value="balanced">Balanced Build</option>
      <option value="quiet">Quiet & Efficient</option>
      <option value="future">Future-Proof</option>
    </select>

    <button onclick="build()">Generate Build</button>
  </div>

  <div class="frame">
    <h2>Your PC Build</h2>
    <table id="result"></table>
  </div>

</div>

<script>
// =========================
// PRICE CONVERSION (NOK → USD)
// =========================
const NOK_TO_USD = 0.095; // approx conversion

function usd(nok) {
  return Math.round(nok * NOK_TO_USD);
}

// =========================
// GPU DATABASE (RTX 50 SERIES)
// =========================
const gpus = [
  { name: "RTX 5050", price: usd(3200), tier: 1 },
  { name: "RTX 5060", price: usd(3800), tier: 2 },
  { name: "RTX 5060 Ti", price: usd(6400), tier: 3 },
  { name: "RTX 5070", price: usd(7500), tier: 4 },
  { name: "RTX 5070 Ti", price: usd(13400), tier: 5 },
  { name: "RTX 5080", price: usd(14900), tier: 6 },
  { name: "RTX 5090", price: usd(37900), tier: 7 }
];

// =========================
// CPU DATABASE (REAL-WORLD)
// =========================
const cpus = [
  { name: "Ryzen 5 9600X", price: usd(2130), tier: 2 },
  { name: "Ryzen 7 7800X3D", price: usd(4200), tier: 4 },
  { name: "Ryzen 7 9800X3D", price: usd(4920), tier: 5 },
  { name: "Ryzen 7 9850X3D", price: usd(5490), tier: 5 },
  { name: "Ryzen 9 9900X3D", price: usd(6204), tier: 6 },
  { name: "Ryzen 9 9950X3D", price: usd(6950), tier: 7 },

  { name: "Intel Core i5-14400F", price: usd(1942), tier: 2 },
  { name: "Intel Core i7-14700K", price: usd(4480), tier: 4 },
  { name: "Intel Core i9-14900K", price: usd(5520), tier: 6 },

  { name: "Ultra 7 270K", price: usd(3610), tier: 4 },
  { name: "Ultra 9 285K", price: usd(6482), tier: 6 }
];

// =========================
// RAM / SSD / PSU PRICES
// =========================
const ramOptions = [
  { size: "16GB DDR5-6000", price: usd(3000) },
  { size: "32GB DDR5-6000", price: usd(4500) },
  { size: "64GB DDR5-6000", price: usd(8000) }
];

const ssds = [
  { size: "1TB NVMe", price: usd(1500) },
  { size: "2TB NVMe", price: usd(3000) }
];

const psus = [
  { watt: "650W Gold", price: usd(1200) },
  { watt: "750W Gold", price: usd(1500) },
  { watt: "850W Gold", price: usd(1800) }
];

// =========================
// BUILD LOGIC
// =========================
function build() {
  const budget = Number(document.getElementById("budget").value);
  const resolution = document.getElementById("resolution").value;
  const priority = document.getElementById("priority").value;

  if (!budget || budget < 300) {
    document.getElementById("result").innerHTML =
      "<tr><td>Please enter a valid budget.</td></tr>";
    return;
  }

  // 1. Choose GPU based on budget
  let gpu = [...gpus].reverse().find(g => g.price <= budget * 0.55);
  if (!gpu) gpu = gpus[0];

  // 2. Choose CPU matching GPU tier
  let cpu = cpus.find(c => c.tier >= gpu.tier - 1) || cpus[0];

  // 3. Choose RAM
  let ram = ramOptions[0];
  if (budget > 1500) ram = ramOptions[1];
  if (budget > 2500) ram = ramOptions[2];

  // 4. Choose SSD
  let ssd = ssds[0];
  if (budget > 2000) ssd = ssds[1];

  // 5. Choose PSU
  let psu = psus[0];
  if (gpu.tier >= 4) psu = psus[1];
  if (gpu.tier >= 6) psu = psus[2];

  // 6. Total price
  const total =
    gpu.price + cpu.price + ram.price + ssd.price + psu.price;

  // 7. Output
  document.getElementById("result").innerHTML = `
    <tr><th>Component</th><th>Selection</th><th>Price (USD)</th></tr>
    <tr><td>GPU</td><td>${gpu.name}</td><td>$${gpu.price}</td></tr>
    <tr><td>CPU</td><td>${cpu.name}</td><td>$${cpu.price}</td></tr>
    <tr><td>RAM</td><td>${ram.size}</td><td>$${ram.price}</td></tr>
    <tr><td>Storage</td><td>${ssd.size}</td><td>$${ssd.price}</td></tr>
    <tr><td>Power Supply</td><td>${psu.watt}</td><td>$${psu.price}</td></tr>
    <tr><th>Total</th><th></th><th>$${total}</th></tr>
  `;
}
</script>

</body>
</html>
