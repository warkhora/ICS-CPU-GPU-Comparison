<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ICS Regent – Build Your PC</title>

<style>
  body {
    margin: 0;
    padding: 40px;
    background: radial-gradient(circle at top, #101010, #000);
    color: #e6e6e6;
    font-family: "Segoe UI", system-ui, sans-serif;
  }

  .ics-container {
    max-width: 1100px;
    margin: auto;
  }

  .ics-header {
    text-align: center;
    margin-bottom: 30px;
  }

  .ics-logo {
    font-size: 26px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: gold;
  }

  .ics-subtitle {
    color: #aaa;
    margin-top: 8px;
    font-size: 14px;
  }

  .ics-frame {
    background: linear-gradient(135deg, rgba(25,25,25,0.9), rgba(10,10,10,0.9));
    border: 1px solid #333;
    padding: 20px;
    margin-bottom: 25px;
    border-radius: 14px;
    transition: 0.3s ease;
    backdrop-filter: blur(6px);
  }

  .ics-frame:hover {
    border-color: gold;
    box-shadow: 0 0 22px rgba(255, 215, 0, 0.55);
    transform: translateY(-2px);
  }

  h1, h2 {
    font-weight: 600;
    letter-spacing: 1px;
    color: #f5f5f5;
    margin-top: 0;
  }

  p {
    color: #b5b5b5;
    font-size: 14px;
  }

  .selectors {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  select, button, input {
    background: #111;
    color: #eee;
    border: 1px solid #444;
    padding: 10px 14px;
    border-radius: 8px;
    margin: 5px 0;
    transition: 0.2s;
    font-size: 14px;
  }

  select:hover, button:hover {
    border-color: gold;
    box-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
  }

  button {
    cursor: pointer;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    font-size: 14px;
  }

  th {
    background: #111;
    padding: 12px;
    border-bottom: 2px solid #333;
    text-align: left;
    color: #f0f0f0;
  }

  td {
    padding: 10px;
    border-bottom: 1px solid #222;
    color: #ddd;
  }

  tr:nth-child(even) td {
    background: rgba(255,255,255,0.01);
  }

  .spec-label {
    font-weight: 600;
    color: #f0f0f0;
    width: 190px;
    white-space: nowrap;
  }

  .product-type {
    font-size: 12px;
    text-transform: uppercase;
    color: #ffdd88;
  }

  .note {
    font-size: 12px;
    color: #888;
    margin-top: 6px;
  }

  label {
    display: block;
    font-weight: 600;
    color: #f0f0f0;
    margin-top: 10px;
  }

  input {
    width: 100%;
    box-sizing: border-box;
  }
</style>

</head>

<body>

<!-- ICS NAVIGATION BAR -->
<div class="ics-nav">
  <a href="index.html" class="nav-link" data-page="index">CPU/GPU Comparison</a>
  <a href="fps.html" class="nav-link" data-page="fps">FPS Estimator</a>
  <a href="canyourunit.html" class="nav-link" data-page="canyourunit">Can You Run It?</a>
  <a href="build.html" class="nav-link" data-page="build">Build Your PC</a>
</div>

<style>
  .ics-nav {
    width: 100%;
    background: rgba(0,0,0,0.65);
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding: 16px 24px;
    display: flex;
    gap: 30px;
    position: sticky;
    top: 0;
    z-index: 999;
    backdrop-filter: blur(12px);
    margin: -40px -40px 40px -40px;
  }

  .ics-nav a {
    color: #ffd700;
    text-decoration: none;
    font-size: 16px;
    letter-spacing: 1px;
    transition: 0.25s ease;
    padding-bottom: 4px;
  }

  .ics-nav a:hover {
    color: white;
    text-shadow: 0 0 10px #ffd700;
  }

  .ics-nav a.active {
    color: white;
    border-bottom: 2px solid #ffd700;
    text-shadow: 0 0 12px #ffd700;
  }
</style>

<script>
  const current = window.location.pathname.split("/").pop().toLowerCase();
  document.querySelectorAll(".nav-link").forEach(link => {
    if (current.includes(link.getAttribute("data-page"))) {
      link.classList.add("active");
    }
  });
</script>

<div class="ics-container">

  <div class="ics-header">
    <div class="ics-logo">ICS REGENT</div>
    <div class="ics-subtitle">Build Your PC — Smart Budget-Based System Generator</div>
  </div>

  <!-- INPUT FRAME -->
  <div class="ics-frame">
    <h2>Build Settings</h2>

    <label>Budget (USD)</label>
    <input type="number" id="budget" placeholder="Enter your budget...">

    <label>Resolution Target</label>
    <select id="resolution">
      <option value="1080">1080p</option>
      <option value="1440">1440p</option>
      <option value="2160">4K</option>
    </select>

    <label>Priority</label>
    <select id="priority">
      <option value="fps">Highest FPS</option>
      <option value="balanced">Balanced Build</option>
      <option value="quiet">Quiet & Efficient</option>
      <option value="future">Future-Proof</option>
    </select>

    <button onclick="build()">Generate Build</button>
  </div>

  <!-- RESULT FRAME -->
  <div class="ics-frame">
    <h2>Your PC Build</h2>
    <table id="result"></table>
  </div>

</div>

<script>
// =========================
// PRICE CONVERSION (NOK → USD)
// =========================
const NOK_TO_USD = 0.095;
function usd(nok) { return Math.round(nok * NOK_TO_USD); }

// =========================
// GPU DATABASE (RTX 50 SERIES)
// =========================
const gpus = [
  { name: "RTX 5050", price: usd(3200), tier: 1 },
  { name: "RTX 5060", price: usd(3800), tier: 2 },
  { name: "RTX 5060 Ti", price: usd(6400), tier: 3 },
  { name: "RTX 5070", price: usd(7500), tier: 4 },
  { name: "RTX 5070 Ti", price: usd(13400), tier: 5 },
  { name: "RTX 5080", price: usd(14900), tier: 6 },
  { name: "RTX 5090", price: usd(37900), tier: 7 }
];

// =========================
// CPU DATABASE (REAL-WORLD)
// =========================
const cpus = [
  { name: "Ryzen 5 9600X", price: usd(2130), tier: 2 },
  { name: "Ryzen 7 7800X3D", price: usd(4200), tier: 4 },
  { name: "Ryzen 7 9800X3D", price: usd(4920), tier: 5 },
  { name: "Ryzen 7 9850X3D", price: usd(5490), tier: 5 },
  { name: "Ryzen 9 9900X3D", price: usd(6204), tier: 6 },
  { name: "Ryzen 9 9950X3D", price: usd(6950), tier: 7 },

  { name: "Intel Core i5-14400F", price: usd(1942), tier: 2 },
  { name: "Intel Core i7-14700K", price: usd(4480), tier: 4 },
  { name: "Intel Core i9-14900K", price: usd(5520), tier: 6 },

  { name: "Ultra 7 270K", price: usd(3610), tier: 4 },
  { name: "Ultra 9 285K", price: usd(6482), tier: 6 }
];

// =========================
// RAM / SSD / PSU PRICES
// =========================
const ramOptions = [
  { size: "16GB DDR5-6000", price: usd(3000) },
  { size: "32GB DDR5-6000", price: usd(4500) },
  { size: "64GB DDR5-6000", price: usd(8000) }
];

const ssds = [
  { size: "1TB NVMe", price: usd(1500) },
  { size: "2TB NVMe", price: usd(3000) }
];

const psus = [
  { watt: "650W Gold", price: usd(1200) },
  { watt: "750W Gold", price: usd(1500) },
  { watt: "850W Gold", price: usd(1800) }
];

// =========================
// BUILD LOGIC
// =========================
function build() {
  const budget = Number(document.getElementById("budget").value);
  const resolution = document.getElementById("resolution").value;
  const priority = document.getElementById("priority").value;

  if (!budget || budget < 300) {
    document.getElementById("result").innerHTML =
      "<tr><td>Please enter a valid budget.</td></tr>";
    return;
  }

  let gpu = [...gpus].reverse().find(g => g.price <= budget * 0.55);
  if (!gpu) gpu = gpus[0];

  let cpu = cpus.find(c => c.tier >= gpu.tier - 1) || cpus[0];

  let ram = ramOptions[0];
  if (budget > 1500) ram = ramOptions[1];
  if (budget > 2500) ram = ramOptions[2];

  let ssd = ssds[0];
  if (budget > 2000) ssd = ssds[1];

  let psu = psus[0];
  if (gpu.tier >= 4) psu = psus[1];
  if (gpu.tier >= 6) psu = psus[2];

  const total = gpu.price + cpu.price + ram.price + ssd.price + psu.price;

  document.getElementById("result").innerHTML = `
    <tr><th>Component</th><th>Selection</th><th>Price (USD)</th></tr>
    <tr><td>GPU</td><td>${gpu.name}</td><td>$${gpu.price}</td></tr>
    <tr><td>CPU</td><td>${cpu.name}</td><td>$${cpu.price}</td></tr>
    <tr><td>RAM</td><td>${ram.size}</td><td>$${ram.price}</td></tr>
    <tr><td>Storage</td><td>${ssd.size}</td><td>$${ssd.price}</td></tr>
    <tr><td>Power Supply</td><td>${psu.watt}</td><td>$${psu.price}</td></tr>
    <tr><th>Total</th><th></th><th>$${total}</th></tr>
  `;
}
</script>

</body>
</html>
