<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ICS Regent – Can You Run It?</title>

<style>
  body {
    margin: 0;
    padding: 40px;
    background: linear-gradient(135deg, #050505, #000000);
    color: #e6e6e6;
    font-family: "Segoe UI", system-ui, sans-serif;
  }

  .ics-container {
    max-width: 1100px;
    margin: auto;
    backdrop-filter: blur(18px);
  }

  .ics-header {
    text-align: center;
    margin-bottom: 30px;
  }

  .ics-logo {
    font-size: 32px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #ffd700;
    font-weight: 600;
  }

  .ics-subtitle {
    color: #bbb;
    margin-top: 8px;
    font-size: 15px;
  }

  .ics-frame {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    padding: 25px;
    margin-bottom: 30px;
    border-radius: 18px;
    transition: 0.3s ease;
    box-shadow: 0 0 25px rgba(255, 215, 0, 0.08);
  }

  .ics-frame:hover {
    border-color: rgba(255, 215, 0, 0.6);
    box-shadow: 0 0 35px rgba(255, 215, 0, 0.25);
    transform: translateY(-3px);
  }

  select, button, input {
    width: 100%;
    background: rgba(20, 20, 20, 0.85);
    color: #eee;
    border: 1px solid rgba(255, 255, 255, 0.18);
    padding: 12px;
    border-radius: 10px;
    margin: 10px 0;
    transition: 0.2s;
    font-size: 15px;
    backdrop-filter: blur(12px);
  }

  select:hover, button:hover, input:hover {
    border-color: #ffd700;
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.4);
  }

  select option {
    background: #111;
    color: #eee;
  }

  .row {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .row-3 {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
  }

  .result-box {
    margin-top: 20px;
    padding: 25px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    text-align: center;
    font-size: 24px;
    font-weight: 600;
    border: 1px solid rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(14px);
    transition: 0.3s ease;
  }

  .result-ok {
    color: #7CFC00;
    text-shadow: 0 0 12px rgba(124, 252, 0, 0.6);
  }

  .result-warn {
    color: #ffae42;
    text-shadow: 0 0 12px rgba(255, 165, 0, 0.6);
  }

  .result-bad {
    color: #ff4d4d;
    text-shadow: 0 0 12px rgba(255, 0, 0, 0.6);
  }

  .experience {
    margin-top: 10px;
    text-align: center;
    font-size: 15px;
    color: #ccc;
  }

  .tips-frame {
    margin-top: 25px;
    padding: 20px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 14px;
    backdrop-filter: blur(12px);
  }

  .tips-title {
    font-size: 18px;
    font-weight: 600;
    color: #ffd700;
    margin-bottom: 10px;
  }

  .tips-list {
    font-size: 14px;
    color: #ddd;
    line-height: 1.6;
    text-align: left;
  }

  .tag {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    margin-right: 6px;
    border: 1px solid rgba(255,255,255,0.2);
  }

  .tag-nvidia { color: #7dd3fc; border-color: #0ea5e9; }
  .tag-amd { color: #f97373; border-color: #ef4444; }
  .tag-ics { color: #facc15; border-color: #eab308; }

  .ics-nav {
    width: 100%;
    background: rgba(0,0,0,0.65);
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding: 16px 24px;
    display: flex;
    gap: 30px;
    position: sticky;
    top: 0;
    z-index: 999;
    backdrop-filter: blur(12px);
    margin: -40px -40px 40px -40px;
  }

  .ics-nav a {
    color: #ffd700;
    text-decoration: none;
    font-size: 16px;
    letter-spacing: 1px;
    transition: 0.2s;
  }

  .ics-nav a:hover {
    color: white;
    text-shadow: 0 0 10px #ffd700;
  }

  .ics-nav a.active {
    color: white;
    border-bottom: 2px solid #ffd700;
    text-shadow: 0 0 12px #ffd700;
  }
</style>
</head>
<body>

<div class="ics-nav">
  <a href="index.html" class="nav-link" data-page="index">CPU/GPU Comparison</a>
  <a href="fps.html" class="nav-link" data-page="fps">FPS Estimator</a>
  <a href="canyourunit.html" class="nav-link" data-page="canyourunit">Can You Run It?</a>
</div>

<script>
  const current = window.location.pathname.split("/").pop().toLowerCase();
  document.querySelectorAll(".nav-link").forEach(link => {
    if (current.includes(link.getAttribute("data-page"))) {
      link.classList.add("active");
    }
  });
</script>

<div class="ics-container">

  <div class="ics-header">
    <div class="ics-logo">ICS REGENT</div>
    <div class="ics-subtitle">Can You Run It? — Hybrid System Analyzer</div>
  </div>

  <!-- Base configuration -->
  <div class="ics-frame">
    <h2>Base Configuration</h2>
    <p>Select your hardware and target game to see if your PC can run it.</p>

    <div class="row">
      <div>
        <label>CPU</label>
        <select id="cpu"></select>
      </div>
      <div>
        <label>GPU</label>
        <select id="gpu"></select>
      </div>
    </div>

    <div class="row">
      <div>
        <label>RAM (GB)</label>
        <input id="ram" type="number" min="4" max="256" value="16">
      </div>
      <div>
        <label>Resolution</label>
        <select id="resolution">
          <option value="1.0">1920×1080 (1080p)</option>
          <option value="1.3">2560×1440 (1440p)</option>
          <option value="1.7">3840×2160 (4K)</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div>
        <label>Game</label>
        <select id="game"></select>
      </div>
      <div>
        <label>Graphics quality</label>
        <select id="gfx">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
          <option value="ultra">Ultra</option>
        </select>
      </div>
    </div>

    <p class="note">
      <span class="tag tag-nvidia">NVIDIA RTX 30 / 40 / 50</span>
      <span class="tag tag-amd">AMD RX 7000 / 9000</span>
      <span class="tag tag-ics">ICS Regent VX Ready</span>
    </p>

    <button id="checkBtn">Analyze System</button>

    <div id="resultBox" class="result-box" style="display:none;"></div>
    <div id="experienceBox" class="experience" style="display:none;"></div>
  </div>

  <div class="ics-frame tips-frame" id="tipsFrame" style="display:none;">
    <div class="tips-title">Optimization & Upgrade Suggestions</div>
    <div class="tips-list" id="tipsList"></div>
  </div>

</div>

<script>
  // ===============================
  //   ICS COMPONENT DATABASE v1.0
  // ===============================

  const CPU_LIST = [
    // AMD Ryzen (best → weakest)
    { name: "AMD Ryzen 9 9950X3D", score: 100 },
    { name: "AMD Ryzen 9 9900X3D", score: 98 },
    { name: "AMD Ryzen 7 9800X3D", score: 97 },
    { name: "AMD Ryzen 7 7800X3D", score: 92 },
    { name: "AMD Ryzen 7 5700X", score: 75 },
    { name: "AMD Ryzen 5 9600X", score: 80 },
    { name: "AMD Ryzen 5 7500F", score: 65 },

    // Intel Core (best → weakest)
    { name: "Intel Core i9-14900HX", score: 95 },
    { name: "Intel Core i9-14900K", score: 94 },
    { name: "Intel Core i9-14900KF", score: 93 },
    { name: "Intel Core i7-14700F", score: 88 },
    { name: "Intel Core i7-13900K", score: 87 },
    { name: "Intel Core i7-12700K", score: 80 },
    { name: "Intel Core i5-14400F", score: 70 },
    { name: "Intel Core i5-12400F", score: 60 },
  ];

  const GPU_LIST = [
    // NVIDIA RTX 50-series
    { name: "NVIDIA GeForce RTX 5090", score: 100 },
    { name: "NVIDIA GeForce RTX 5080", score: 95 },
    { name: "NVIDIA GeForce RTX 5070 Ti", score: 90 },
    { name: "NVIDIA GeForce RTX 5070", score: 88 },
    { name: "NVIDIA GeForce RTX 5060 Ti", score: 80 },
    { name: "NVIDIA GeForce RTX 5060", score: 75 },
    { name: "NVIDIA GeForce RTX 5050", score: 65 },

    // NVIDIA RTX 40-series
    { name: "NVIDIA GeForce RTX 4090", score: 98 },
    { name: "NVIDIA GeForce RTX 4080", score: 92 },
    { name: "NVIDIA GeForce RTX 4070 Ti", score: 85 },
    { name: "NVIDIA GeForce RTX 4070", score: 80 },
    { name: "NVIDIA GeForce RTX 4060 Ti", score: 72 },
    { name: "NVIDIA GeForce RTX 4060", score: 65 },
    { name: "NVIDIA GeForce RTX 4050", score: 55 },

    // NVIDIA RTX 30-series
    { name: "NVIDIA GeForce RTX 3090", score: 90 },
    { name: "NVIDIA GeForce RTX 3080 Ti", score: 88 },
    { name: "NVIDIA GeForce RTX 3080", score: 85 },
    { name: "NVIDIA GeForce RTX 3070 Ti", score: 78 },
    { name: "NVIDIA GeForce RTX 3070", score: 75 },
    { name: "NVIDIA GeForce RTX 3060", score: 60 },
    { name: "NVIDIA GeForce RTX 3050 8GB", score: 50 },
    { name: "NVIDIA GeForce RTX 3050 6GB", score: 45 },

    // AMD RX 9000-series
    { name: "AMD Radeon RX 9070 XT", score: 93 },
    { name: "AMD Radeon RX 9070", score: 90 },
    { name: "AMD Radeon RX 9060 XT", score: 82 },
    { name: "AMD Radeon RX 9060", score: 78 },

    // AMD RX 7000-series
    { name: "AMD Radeon RX 7900 XTX", score: 92 },
    { name: "AMD Radeon RX 7900 XT", score: 88 },
    { name: "AMD Radeon RX 7900", score: 85 },
    { name: "AMD Radeon RX 7800 XT", score: 80 },
    { name: "AMD Radeon RX 7800", score: 75 },
    { name: "AMD Radeon RX 7700 XT", score: 70 },
    { name: "AMD Radeon RX 7700", score: 65 },
    { name: "AMD Radeon RX 7600 XT", score: 55 },
    { name: "AMD Radeon RX 7600", score: 50 },

    // Intel Arc
    { name: "Intel Arc A770", score: 60 },
  ];

  // ===============================
  // GAME DATABASE (example)
  // ===============================

  const GAME_LIST = [
    {
      name: "Cyberpunk 2077 (RT Ultra)",
      cpuReq: 80,
      gpuReq: 90,
      ramReq: 16
    },
    {
      name: "Fortnite (Competitive)",
      cpuReq: 55,
      gpuReq: 55,
      ramReq: 8
    },
    {
      name: "GTA VI (estimated)",
      cpuReq: 75,
      gpuReq: 85,
      ramReq: 16
    },
    {
      name: "Valorant",
      cpuReq: 35,
      gpuReq: 30,
      ramReq: 8
    },
    {
      name: "Horizon Forbidden West",
      cpuReq: 65,
      gpuReq: 75,
      ramReq: 16
    }
  ];

  // ===============================
  // POPULATE SELECTS
  // ===============================

  const cpuSelect = document.getElementById("cpu");
  const gpuSelect = document.getElementById("gpu");
  const gameSelect = document.getElementById("game");
  const resSelect = document.getElementById("resolution");
  const ramInput = document.getElementById("ram");
  const checkBtn = document.getElementById("checkBtn");
  const resultBox = document.getElementById("resultBox");
  const experienceBox = document.getElementById("experienceBox");
  const tipsFrame = document.getElementById("tipsFrame");
  const tipsList = document.getElementById("tipsList");

  function fillSelect(selectEl, list, key = "name") {
    list.forEach(item => {
      const opt = document.createElement("option");
      opt.value = item[key];
      opt.textContent = item[key];
      selectEl.appendChild(opt);
    });
  }

  fillSelect(cpuSelect, CPU_LIST);
  fillSelect(gpuSelect, GPU_LIST);
  fillSelect(gameSelect, GAME_LIST);

  // ===============================
  // HELPERS
  // ===============================

  function findCpuScore(name) {
    const cpu = CPU_LIST.find(c => c.name === name);
    return cpu ? cpu.score : 0;
  }

  function findGpuScore(name) {
    const gpu = GPU_LIST.find(g => g.name === name);
    return gpu ? gpu.score : 0;
  }

  function findGame(name) {
    return GAME_LIST.find(g => g.name === name);
  }

  function gfxMultiplier(gfx) {
    switch (gfx) {
      case "low": return 0.75;
      case "medium": return 1.0;
      case "high": return 1.15;
      case "ultra": return 1.3;
      default: return 1.0;
    }
  }

  // ===============================
  // MAIN LOGIC – CAN YOU RUN IT?
  // ===============================

  checkBtn.addEventListener("click", () => {
    const cpuName = cpuSelect.value;
    const gpuName = gpuSelect.value;
    const gameName = gameSelect.value;
    const resScale = parseFloat(resSelect.value);
    const ramGB = parseInt(ramInput.value || "0", 10);
    const gfx = document.getElementById("gfx").value;

    const cpuScore = findCpuScore(cpuName);
    const gpuScore = findGpuScore(gpuName);
    const game = findGame(gameName);

    if (!game) return;

    const gfxMul = gfxMultiplier(gfx);

    // Base requirements scaled by resolution and graphics quality
    const cpuReq = Math.round(game.cpuReq * (resScale >= 1.5 ? 1.1 : 1.0) * gfxMul);
    const gpuReq = Math.round(game.gpuReq * resScale * gfxMul);
    const ramReq = game.ramReq;

    const cpuOK = cpuScore >= cpuReq;
    const gpuOK = gpuScore >= gpuReq;
    const ramOK = ramGB >= ramReq;

    const allOK = cpuOK && gpuOK && ramOK;

    // Build result text
    let resultClass = "";
    let resultText = "";

    if (allOK) {
      resultClass = "result-ok";
      resultText = `Yes – your PC can run ${gameName} comfortably.`;
    } else if ((cpuOK && gpuOK) || (cpuOK && ramOK) || (gpuOK && ramOK)) {
      resultClass = "result-warn";
      resultText = `Partially compatible – ${gameName} will run, but not at ideal settings.`;
    } else {
      resultClass = "result-bad";
      resultText = `No – your PC will struggle with ${gameName} at this configuration.`;
    }

    resultBox.className = "result-box " + resultClass;
    resultBox.textContent = resultText;
    resultBox.style.display = "block";

    // Experience text
    let exp = "";
    if (allOK) {
      exp = "You can expect smooth gameplay with this combination, especially if you fine-tune graphics settings.";
    } else if (resultClass === "result-warn") {
      exp = "Lowering resolution or graphics quality will significantly improve your experience.";
    } else {
      exp = "Consider upgrading GPU, CPU or RAM, or lowering resolution and graphics quality.";
    }
    experienceBox.textContent = exp;
    experienceBox.style.display = "block";

    // Tips
    const tips = [];
    if (!cpuOK) {
      tips.push(`• Your CPU (${cpuName}) is below the recommended level for this game at the selected settings.`);
    }
    if (!gpuOK) {
      tips.push(`• Your GPU (${gpuName}) is the main bottleneck. Reducing resolution or graphics quality will help.`);
    }
    if (!ramOK) {
      tips.push(`• You have ${ramGB} GB RAM, but this game prefers at least ${ramReq} GB.`);
    }
    if (allOK) {
      tips.push("• Your configuration is well-balanced. You can focus on in-game tuning (DLSS/FSR, RT, frame generation).");
    } else {
      tips.push("• Try 1080p and Medium/High first, then adjust upwards if performance is acceptable.");
    }

    tipsList.innerHTML = tips.map(t => `<div>${t}</div>`).join("");
    tipsFrame.style.display = "block";
  });
</script>

</body>
</html>
