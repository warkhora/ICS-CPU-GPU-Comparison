<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FPS Estimator – Can You Run It?</title>
  <style>
    body {
      background: #05060a;
      color: #f5f5f5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
    }

    .page {
      max-width: 1100px;
      margin: 40px auto;
      padding: 24px;
      background: radial-gradient(circle at top, #151827 0, #05060a 55%);
      border-radius: 18px;
      box-shadow: 0 0 40px rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.06);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
      letter-spacing: 0.04em;
    }

    .subtitle {
      opacity: 0.8;
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin-bottom: 24px;
    }

    .card {
      background: linear-gradient(145deg, rgba(255,255,255,0.03), rgba(0,0,0,0.7));
      border-radius: 14px;
      padding: 16px 18px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 24px rgba(255,215,128,0.25);
      border-color: rgba(255,215,128,0.7);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 18px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.9;
    }

    label {
      display: block;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.75;
      margin-bottom: 6px;
    }

    select, input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(3,5,10,0.9);
      color: #f5f5f5;
      font-size: 14px;
      outline: none;
    }

    select:focus, input:focus {
      border-color: rgba(255,215,128,0.9);
      box-shadow: 0 0 0 1px rgba(255,215,128,0.4);
    }

    button {
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #ffd780, #ff9f40);
      color: #1a1205;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 6px;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 18px rgba(255,215,128,0.6);
    }

    .result {
      margin-top: 20px;
      padding: 16px 18px;
      border-radius: 14px;
      background: radial-gradient(circle at top left, rgba(120,255,180,0.18), rgba(0,0,0,0.9));
      border: 1px solid rgba(120,255,180,0.6);
    }

    .result.bad {
      background: radial-gradient(circle at top left, rgba(255,120,120,0.18), rgba(0,0,0,0.9));
      border-color: rgba(255,120,120,0.7);
    }

    .result h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .result p {
      margin: 4px 0;
      font-size: 14px;
      opacity: 0.9;
    }

    .tagline {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      opacity: 0.7;
      margin-bottom: 4px;
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      opacity: 0.6;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="tagline">ICS PERFORMANCE SUITE</div>
    <h1>Can You Run It?</h1>
    <div class="subtitle">
      Velg CPU, GPU, RAM og spill – så får du en profesjonell vurdering av om PC‑en din klarer det.
    </div>

    <div class="grid">
      <div class="card">
        <h2>CPU</h2>
        <label for="cpuSelect">Velg prosessor</label>
        <select id="cpuSelect"></select>
      </div>

      <div class="card">
        <h2>GPU</h2>
        <label for="gpuSelect">Velg skjermkort</label>
        <select id="gpuSelect"></select>
      </div>

      <div class="card">
        <h2>Minne</h2>
        <label for="ramInput">RAM (GB)</label>
        <input id="ramInput" type="number" min="4" max="256" value="16" />
      </div>

      <div class="card">
        <h2>Spill</h2>
        <label for="gameSelect">Velg spill</label>
        <select id="gameSelect"></select>

        <label for="resSelect" style="margin-top:10px;">Oppløsning</label>
        <select id="resSelect">
          <option value="1.0">1080p</option>
          <option value="1.3">1440p</option>
          <option value="1.7">4K</option>
        </select>
      </div>
    </div>

    <button id="checkBtn">Sjekk om du kan kjøre det</button>

    <div id="resultBox" class="result" style="display:none;"></div>

    <div class="footer">
      FPS Estimator · ICS Regent · Prototype build
    </div>
  </div>

  <script>
    // ===============================
    //   ICS COMPONENT DATABASE v1.0
    // ===============================

    const CPU_LIST = [
      // AMD Ryzen
      { name: "AMD Ryzen 9 9950X3D", score: 100 },
      { name: "AMD Ryzen 9 9900X3D", score: 98 },
      { name: "AMD Ryzen 7 9800X3D", score: 97 },
      { name: "AMD Ryzen 7 7800X3D", score: 92 },
      { name: "AMD Ryzen 7 5700X", score: 75 },
      { name: "AMD Ryzen 5 9600X", score: 80 },
      { name: "AMD Ryzen 5 7500F", score: 65 },

      // Intel Core
      { name: "Intel Core i9-14900HX", score: 95 },
      { name: "Intel Core i9-14900K", score: 94 },
      { name: "Intel Core i9-14900KF", score: 93 },
      { name: "Intel Core i7-14700F", score: 88 },
      { name: "Intel Core i7-13900K", score: 87 },
      { name: "Intel Core i7-12700K", score: 80 },
      { name: "Intel Core i5-14400F", score: 70 },
      { name: "Intel Core i5-12400F", score: 60 },
    ];

    const GPU_LIST = [
      // NVIDIA RTX 50
      { name: "NVIDIA GeForce RTX 5090", score: 100 },
      { name: "NVIDIA GeForce RTX 5080", score: 95 },
      { name: "NVIDIA GeForce RTX 5070 Ti", score: 90 },
      { name: "NVIDIA GeForce RTX 5070", score: 88 },
      { name: "NVIDIA GeForce RTX 5060 Ti", score: 80 },
      { name: "NVIDIA GeForce RTX 5060", score: 75 },
      { name: "NVIDIA GeForce RTX 5050", score: 65 },

      // NVIDIA RTX 40
      { name: "NVIDIA GeForce RTX 4090", score: 98 },
      { name: "NVIDIA GeForce RTX 4080", score: 92 },
      { name: "NVIDIA GeForce RTX 4070 Ti", score: 85 },
      { name: "NVIDIA GeForce RTX 4070", score: 80 },
      { name: "NVIDIA GeForce RTX 4060 Ti", score: 72 },
      { name: "NVIDIA GeForce RTX 4060", score: 65 },
      { name: "NVIDIA GeForce RTX 4050", score: 55 },

      // NVIDIA RTX 30
      { name: "NVIDIA GeForce RTX 3090", score: 90 },
      { name: "NVIDIA GeForce RTX 3080 Ti", score: 88 },
      { name: "NVIDIA GeForce RTX 3080", score: 85 },
      { name: "NVIDIA GeForce RTX 3070 Ti", score: 78 },
      { name: "NVIDIA GeForce RTX 3070", score: 75 },
      { name: "NVIDIA GeForce RTX 3060", score: 60 },
      { name: "NVIDIA GeForce RTX 3050 8GB", score: 50 },
      { name: "NVIDIA GeForce RTX 3050 6GB", score: 45 },

      // AMD RX 9000
      { name: "AMD Radeon RX 9070 XT", score: 93 },
      { name: "AMD Radeon RX 9070", score: 90 },
      { name: "AMD Radeon RX 9060 XT", score: 82 },
      { name: "AMD Radeon RX 9060", score: 78 },

      // AMD RX 7000
      { name: "AMD Radeon RX 7900 XTX", score: 92 },
      { name: "AMD Radeon RX 7900 XT", score: 88 },
      { name: "AMD Radeon RX 7900", score: 85 },
      { name: "AMD Radeon RX 7800 XT", score: 80 },
      { name: "AMD Radeon RX 7800", score: 75 },
      { name: "AMD Radeon RX 7700 XT", score: 70 },
      { name: "AMD Radeon RX 7700", score: 65 },
      { name: "AMD Radeon RX 7600 XT", score: 55 },
      { name: "AMD Radeon RX 7600", score: 50 },

      // Intel Arc
      { name: "Intel Arc A770", score: 60 },
    ];

    // ===============================
    // GAME DATABASE (eksempel)
    // ===============================
    // Du kan lett legge til flere spill her.
    // cpuReq / gpuReq / ramReq er "score-nivåer" og GB.

    const GAME_LIST = [
      {
        name: "Cyberpunk 2077 (RT Ultra)",
        cpuReq: 80,
        gpuReq: 90,
        ramReq: 16
      },
      {
        name: "Fortnite (Competitive)",
        cpuReq: 55,
        gpuReq: 55,
        ramReq: 8
      },
      {
        name: "GTA VI (estimert)",
        cpuReq: 75,
        gpuReq: 85,
        ramReq: 16
      },
      {
        name: "Valorant",
        cpuReq: 35,
        gpuReq: 30,
        ramReq: 8
      },
      {
        name: "Horizon Forbidden West",
        cpuReq: 65,
        gpuReq: 75,
        ramReq: 16
      }
    ];

    // ===============================
    // POPULATE SELECTORS
    // ===============================

    const cpuSelect = document.getElementById("cpuSelect");
    const gpuSelect = document.getElementById("gpuSelect");
    const gameSelect = document.getElementById("gameSelect");
    const resSelect = document.getElementById("resSelect");
    const ramInput = document.getElementById("ramInput");
    const resultBox = document.getElementById("resultBox");
    const checkBtn = document.getElementById("checkBtn");

    function fillSelect(selectEl, list) {
      list.forEach(item => {
        const opt = document.createElement("option");
        opt.value = item.name;
        opt.textContent = item.name;
        selectEl.appendChild(opt);
      });
    }

    fillSelect(cpuSelect, CPU_LIST);
    fillSelect(gpuSelect, GPU_LIST);
    fillSelect(gameSelect, GAME_LIST);

    // ===============================
    // HELPER: FINN SCORE
    // ===============================

    function findCpuScore(name) {
      const cpu = CPU_LIST.find(c => c.name === name);
      return cpu ? cpu.score : 0;
    }

    function findGpuScore(name) {
      const gpu = GPU_LIST.find(g => g.name === name);
      return gpu ? gpu.score : 0;
    }

    function findGame(name) {
      return GAME_LIST.find(g => g.name === name);
    }

    // ===============================
    // MAIN LOGIC – CAN YOU RUN IT?
    // ===============================

    checkBtn.addEventListener("click", () => {
      const cpuName = cpuSelect.value;
      const gpuName = gpuSelect.value;
      const gameName = gameSelect.value;
      const resScale = parseFloat(resSelect.value);
      const ramGB = parseInt(ramInput.value || "0", 10);

      const cpuScore = findCpuScore(cpuName);
      const gpuScore = findGpuScore(gpuName);
      const game = findGame(gameName);

      if (!game) return;

      // Skaler krav basert på oppløsning
      const cpuReq = Math.round(game.cpuReq * (resScale >= 1.5 ? 1.1 : 1.0));
      const gpuReq = Math.round(game.gpuReq * resScale);
      const ramReq = game.ramReq;

      const cpuOK = cpuScore >= cpuReq;
      const gpuOK = gpuScore >= gpuReq;
      const ramOK = ramGB >= ramReq;

      const allOK = cpuOK && gpuOK && ramOK;

      let html = "";
      if (allOK) {
        resultBox.classList.remove("bad");
        html += `<h3>Ja – PC-en din kan kjøre ${gameName}!</h3>`;
        html += `<p><strong>Forventning:</strong> God opplevelse på valgt oppløsning, med riktige grafikkinnstillinger.</p>`;
      } else {
        resultBox.classList.add("bad");
        html += `<h3>Ikke optimalt – PC-en din vil slite med ${gameName}.</h3>`;
        html += `<p><strong>Forventning:</strong> Du må senke grafikk, oppløsning eller oppgradere komponenter.</p>`;
      }

      html += `<p><strong>CPU:</strong> ${cpuName} (score ${cpuScore}) – krav: ${cpuReq} → ${cpuOK ? "OK" : "Flaskehals"}</p>`;
      html += `<p><strong>GPU:</strong> ${gpuName} (score ${gpuScore}) – krav: ${gpuReq} → ${gpuOK ? "OK" : "Flaskehals"}</p>`;
      html += `<p><strong>RAM:</strong> ${ramGB} GB – krav: ${ramReq} GB → ${ramOK ? "OK" : "For lite"}</p>`;

      html += `<p style="margin-top:10px;opacity:0.85;">
        Du kan finjustere logikken senere (DLSS, FSR, RT‑nivåer, osv.) – dette er en ren, stabil base.
      </p>`;

      resultBox.innerHTML = html;
      resultBox.style.display = "block";
    });
  </script>
</body>
</html>
