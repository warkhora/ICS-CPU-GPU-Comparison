<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ICS Hybrid FPS Estimator v2.3</title>

<style>
  body {
    margin: 0;
    padding: 40px;
    background: linear-gradient(135deg, #050505, #000000);
    color: #e6e6e6;
    font-family: "Segoe UI", system-ui, sans-serif;
  }

  .ics-container {
    max-width: 1100px;
    margin: auto;
    backdrop-filter: blur(18px);
  }

  .ics-header {
    text-align: center;
    margin-bottom: 30px;
  }

  .ics-logo {
    font-size: 32px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #ffd700;
    font-weight: 600;
  }

  .ics-subtitle {
    color: #bbb;
    margin-top: 8px;
    font-size: 15px;
  }

  .ics-frame {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    padding: 25px;
    margin-bottom: 30px;
    border-radius: 18px;
    transition: 0.3s ease;
    box-shadow: 0 0 25px rgba(255, 215, 0, 0.08);
  }

  .ics-frame:hover {
    border-color: rgba(255, 215, 0, 0.6);
    box-shadow: 0 0 35px rgba(255, 215, 0, 0.25);
    transform: translateY(-3px);
  }

  select, button {
    width: 100%;
    background: rgba(20, 20, 20, 0.85);
    color: #eee;
    border: 1px solid rgba(255, 255, 255, 0.18);
    padding: 12px;
    border-radius: 10px;
    margin: 10px 0;
    transition: 0.2s;
    font-size: 15px;
    backdrop-filter: blur(12px);
  }

  select:hover, button:hover {
    border-color: #ffd700;
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.4);
  }

  select option {
    background: #111;
    color: #eee;
  }

  .row {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .row-3 {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
  }

  .result-box {
    margin-top: 20px;
    padding: 25px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    text-align: center;
    font-size: 32px;
    font-weight: 700;
    border: 1px solid rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(14px);
    transition: 0.3s ease;
  }

  .fps-red    { color: #ff4d4d; text-shadow: 0 0 12px rgba(255, 0, 0, 0.6); }
  .fps-orange { color: #ffae42; text-shadow: 0 0 12px rgba(255, 165, 0, 0.6); }
  .fps-white  { color: #ffffff; text-shadow: 0 0 12px rgba(255, 255, 255, 0.6); }
  .fps-green  { color: #7CFC00; text-shadow: 0 0 12px rgba(124, 252, 0, 0.6); }
  .fps-blue   { color: #4dc3ff; text-shadow: 0 0 12px rgba(0, 170, 255, 0.6); }

  .experience {
    margin-top: 10px;
    text-align: center;
    font-size: 15px;
    color: #ccc;
  }

  .tips-frame {
    margin-top: 25px;
    padding: 20px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 14px;
    backdrop-filter: blur(12px);
  }

  .tips-title {
    font-size: 18px;
    font-weight: 600;
    color: #ffd700;
    margin-bottom: 10px;
  }

  .tips-list {
    font-size: 14px;
    color: #ddd;
    line-height: 1.6;
  }

  .tag {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    margin-right: 6px;
    border: 1px solid rgba(255,255,255,0.2);
  }

  .tag-nvidia { color: #7dd3fc; border-color: #0ea5e9; }
  .tag-amd { color: #f97373; border-color: #ef4444; }
  .tag-ics { color: #facc15; border-color: #eab308; }

  .ics-nav {
    width: 100%;
    background: rgba(0,0,0,0.65);
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding: 16px 24px;
    display: flex;
    gap: 30px;
    position: sticky;
    top: 0;
    z-index: 999;
    backdrop-filter: blur(12px);
    margin: -40px -40px 40px -40px;
  }

  .ics-nav a {
    color: #ffd700;
    text-decoration: none;
    font-size: 16px;
    letter-spacing: 1px;
    transition: 0.2s;
  }

  .ics-nav a:hover {
    color: white;
    text-shadow: 0 0 10px #ffd700;
  }
</style>
</head>
<body>

<div class="ics-nav">
  <a href="index.html">CPU/GPU Comparison</a>
  <a href="fps.html">FPS Estimator</a>
</div>

<div class="ics-container">

  <div class="ics-header">
    <div class="ics-logo">ICS REGENT</div>
    <div class="ics-subtitle">Hybrid FPS Estimator v2.3 — RTX 40/50 • RX 7000/9000 • ICS VX</div>
  </div>

  <div class="ics-frame">
    <h2>Base Configuration</h2>
    <p>Select CPU, GPU, game and resolution.</p>

    <div class="row">
      <div>
        <label>CPU</label>
        <select id="cpu"></select>
      </div>
      <div>
        <label>GPU</label>
        <select id="gpu"></select>
      </div>
    </div>

    <div class="row">
      <div>
        <label>Game</label>
        <select id="game"></select>
      </div>
      <div>
        <label>Resolution</label>
        <select id="resolution"></select>
      </div>
    </div>

    <p class="note">
      <span class="tag tag-nvidia">NVIDIA RTX 40 / 50</span>
      <span class="tag tag-amd">AMD RX 7000 / 9000</span>
      <span class="tag tag-ics">ICS Regent VX</span>
    </p>
  </div>

  <div class="ics-frame">
    <h2>Upscaling & Frame Generation</h2>

    <div class="row-3">
      <div>
        <label>DLSS / FSR</label>
        <select id="dlss">
          <option value="off">Off</option>
          <option value="quality">Quality</option>
          <option value="balanced">Balanced</option>
          <option value="performance">Performance</option>
          <option value="ultra">Ultra Performance</option>
        </select>
      </div>
      <div>
        <label>DCC (ICS Only)</label>
        <select id="dcc">
          <option value="off">Off</option>
          <option value="quality">Quality</option>
          <option value="balanced">Balanced</option>
          <option value="performance">Performance</option>
          <option value="ultra">Ultra Performance</option>
        </select>
      </div>
      <div>
        <label>Frame Generation</label>
        <select id="fg">
          <option value="off">Off</option>
          <option value="on">On</option>
        </select>
      </div>
    </div>
  </div>

  <div class="ics-frame">
    <h2>Estimate FPS</h2>
    <button onclick="estimateFPS()">Estimate FPS</button>

    <div id="result" class="result-box" style="display:none;"></div>
    <div id="experience" class="experience"></div>

    <div id="tips" class="tips-frame" style="display:none;">
      <div class="tips-title">⚠️ ICS Performance Tips</div>
      <div id="tips-list" class="tips-list"></div>
    </div>
  </div>

</div>

<script>
/* CPU SCORES */
const cpuScores = {
  "Regent GX 9-9995RX4D": 26000,
  "Regent GX 7-9750RX3": 21000,
  "AMD Ryzen 9 9950X3D": 22000,
  "AMD Ryzen 7 7800X3D": 19000,
  "Intel Core i9-14900K": 18500,
  "Intel Core i5-12400F": 9000
};

/* GPU SCORES */
const gpuData = {
  "Regent VX 6690": { score: 34000, vendor: "ics", gen: "ics" },
  "Regent VX 6670": { score: 28000, vendor: "ics", gen: "ics" },

  "NVIDIA RTX 5090": { score: 36000, vendor: "nvidia", gen: "rtx50" },
  "NVIDIA RTX 5080": { score: 32000, vendor: "nvidia", gen: "rtx50" },
  "NVIDIA RTX 5070 Ti": { score: 28000, vendor: "nvidia", gen: "rtx50" },
  "NVIDIA RTX 5070": { score: 25000, vendor: "nvidia", gen: "rtx50" },
  "NVIDIA RTX 5060 Ti": { score: 21000, vendor: "nvidia", gen: "rtx50" },
  "NVIDIA RTX 5060": { score: 18000, vendor: "nvidia", gen: "rtx50" },
  "NVIDIA RTX 5050": { score: 15000, vendor: "nvidia", gen: "rtx50" },

  "NVIDIA RTX 4090": { score: 32000, vendor: "nvidia", gen: "rtx40" },
  "NVIDIA RTX 4080 Super": { score: 27000, vendor: "nvidia", gen: "rtx40" },
  "NVIDIA RTX 4070 Ti Super": { score: 22000, vendor: "nvidia", gen: "rtx40" },
  "NVIDIA RTX 4070": { score: 18000, vendor: "nvidia", gen: "rtx40" },

  "AMD RX 7900 XTX": { score: 26000, vendor: "amd", gen: "amd7" },
  "AMD RX 7900 XT": { score: 23000, vendor: "amd", gen: "amd7" },
  "AMD RX 7800 XT": { score: 19000, vendor: "amd", gen: "amd7" },

  "AMD RX 9070 XT": { score: 25000, vendor: "amd", gen: "amd9" },
  "AMD RX 9070": { score: 22000, vendor: "amd", gen: "amd9" },
  "AMD RX 9060 XT": { score: 19000, vendor: "amd", gen: "amd9" },
  "AMD RX 9060": { score: 16000, vendor: "amd", gen: "amd9" }
};

/* GAME MULTIPLIERS */
const gameMultipliers = {
  "GTA V (Very High)": { mul: 2.8, weight: "light" },
  "Valorant": { mul: 3.2, weight: "light" },
  "Fortnite (Competitive)": { mul: 1.8, weight: "light" },
  "Apex Legends": { mul: 1.4, weight: "medium" },
  "Cyberpunk 2077 (RT Off)": { mul: 0.8, weight: "heavy" },
  "Cyberpunk 2077 (RT Medium)": { mul: 0.55, weight: "heavy" },
  "GTA VI (Speculative)": { mul: 0.7, weight: "heavy" },
  "Minecraft RTX": { mul: 0.45, weight: "heavy" }
};

/* RESOLUTION MULTIPLIERS */
const resolutionMultipliers = {
  "1080p": 1.0,
  "1440p": 0.72,
  "4K": 0.42
};

/* UPSCALING MULTIPLIERS */
const dlss50 = { off:1.0, quality:1.7, balanced:2.1, performance:2.9, ultra:3.9 };
const dlss40 = { off:1.0, quality:1.3, balanced:1.7, performance:2.3, ultra:3.1 };
const fsr     = { off:1.0, quality:1.15, balanced:1.3, performance:1.5, ultra:1.8 };
const dccMultipliers = { off:1.0, quality:1.5, balanced:1.9, performance:2.5, ultra:3.2 };

/* FRAME GENERATION MULTIPLIERS */
const fgMultipliers = {
  rtx50: 2.5,
  rtx40: 1.6,
  ics:   2.8,
  amd7:  1.0,
  amd9:  1.0
};

/* Populate selectors */
function loadSelectors() {
  const cpuSel  = document.getElementById("cpu");
  const gpuSel  = document.getElementById("gpu");
  const gameSel = document.getElementById("game");
  const resSel  = document.getElementById("resolution");

  Object.keys(cpuScores).forEach(c => cpuSel.innerHTML  += `<option>${c}</option>`);
  Object.keys(gpuData).forEach(g   => gpuSel.innerHTML  += `<option>${g}</option>`);
  Object.keys(gameMultipliers).forEach(g => gameSel.innerHTML += `<option>${g}</option>`);
  Object.keys(resolutionMultipliers).forEach(r => resSel.innerHTML += `<option>${r}</option>`);

  cpuSel.value  = "AMD Ryzen 7 7800X3D";
  gpuSel.value  = "NVIDIA RTX 4080 Super";
  gameSel.value = "GTA V (Very High)";
  resSel.value  = "1080p";
}
loadSelectors();

/* Experience rating */
function getExperience(fps) {
  if (fps < 30)  return "Unplayable";
  if (fps < 60)  return "Playable but not smooth";
  if (fps < 120) return "Smooth";
  if (fps < 160) return "Very smooth";
  return "Ultra smooth / Esports level";
}

/* FPS color class */
function getFpsClass(fps) {
  if (fps < 30)  return "fps-red";
  if (fps < 60)  return "fps-orange";
  if (fps < 120) return "fps-white";
  if (fps < 160) return "fps-green";
  return "fps-blue";
}

/* Suggestions */
function buildSuggestions(fps, gpuInfo, dlssMode, dccMode, fgOn, res, gameName) {
  if (fps >= 120) return "";

  const tips = [];

  tips.push("• Lower resolution (e.g. 1440p → 1080p).");
  tips.push("• Reduce graphics settings (shadows, post-processing).");

  if (gpuInfo.vendor === "nvidia") {
